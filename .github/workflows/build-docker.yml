name: Build and Publish image to a private Docker Hub registry
on:
  push:
    branches: ["master"]

jobs:
  publish_images:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run:
          docker build ./ -t ${{secrets.DOCKER_HUB_USERNAME}}/fortstarktest:latest
      - name: push image to docker hub
        run:
          docker login -u ${{secrets.DOCKER_HUB_USERNAME}} -p ${{secrets.DOCKER_HUB_TOKEN}} && docker push edwardmaged/fortstarktest:latest
